<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Superbike Sale</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            color: #333;
        }
        #box1{
            width: 900px;
            height: 400px;
            background-image: url(lamborgnii2.png);
            background-size: cover;
        }

        header {
            background-color: #000;
            color: #fff;
            padding: 20px;
            text-align: center;
        }

        .hero {
            position: relative;
            background: url('superbike.jpg') no-repeat center center/cover;
            height: 60vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.7);
        }
       


        .hero h1 {
            font-size: 3em;
            margin: 0;
        }

        .content {
            padding: 20px;
            text-align: center;
        }

        .specs {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin: 20px 0;
        }

        .spec {
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            padding: 20px;
        }

        .cta {
            margin-top: 30px;
        }

        .cta a {
            display: inline-block;
            background: #ff4500;
            color: #fff;
            padding: 15px 30px;
            border-radius: 5px;
            text-decoration: none;
            font-size: 1.2em;
            transition: background 0.3s;
        }

        .cta a:hover {
            background: #e63e00;
        }
        #box2{
            text-align: left;
        }

        footer {
            background-color: #000;
            color: #fff;
            text-align: center;
            padding: 10px;
            margin-top: 20px;
        }
        #box2{
            text-align: center;
            color: #ff4500;
            font-size: 50px;
        }
        
        button{
            background-color: black;
            color: white;
            height: 50px;
            width: 50;
        }
        
       
        
    </style>
</head>
<body>
    <header>
        <h1> Superbike Seller</h1>
    </header>

    <section class="hero">
     <div id="box1"> </div>  
     <br><br><br><br><br><

   

    </section>

    <section class="content">
        <p id="box2"> Lamborghini revuelto</p> 
        <h2>Specifications</h2>
        <div class="specs">
            <div class="spec">
                <h3>Engine</h3>
                <p>1000cc, Inline 4-cylinder</p>
            </div>
            <div class="spec">
                <h3>Top Speed</h3>
                <p>320 km/h</p>
            </div>
            <div class="spec">
                <h3>Weight</h3>
                <p>200 kg</p>
            </div>
            <div class="spec">
                <h3>Price</h3>
                <p>$35,000</p>
            </div>
        </div>

        <div class="cta">
            <a href="#">Buy Now</a>
        </div>
        <a href="5.html">
            <button>Next Page</button>
        </a>
        
    </section>

    <footer>
        <p>&copy; 2025 Superbike Inc. All rights reserved.</p>
    </footer>
</body>
</html>
