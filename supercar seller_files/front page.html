<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUPERCAR SELLER</title>
    <link rel="stylesheet" href="WEBSITE.CSS">
    <style>
        /* Importing Google Fonts for better typography */
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap');

        /* Global Styles */
        body {
            font-family: 'Roboto', sans-serif;
            background-image: url('avata.png');
            background-size: cover;
            margin: 0;
            padding: 0;
            color: #fff;
            display: flex;
            justify-content: center; /* Center the content horizontally */
            align-items: center; /* Center the content vertically */
            height: 100vh; /* Full viewport height */
            position: relative;
            flex-direction: column;
        }

        /* Navigation Bar Styling */
        nav {
            background-color: #333; /* Dark background color */
            padding: 15px 20px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }

        nav h1 {
            font-size: 28px;
            font-weight: bold;
            margin-left: 20px;
            color: #ffcc00;
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 30px;
            margin-right: 20px;
        }

        nav ul li {
            display: inline;
        }

        nav ul li a {
            color: white;
            text-decoration: none;
            font-size: 18px;
            padding: 10px 15px;
            border-radius: 5px;
            transition: background 0.3s, transform 0.2s;
        }

        nav ul li a:hover {
            background: #ffcc00;
            transform: scale(1.1);
        }

        /* New Search Bar Styling */
        .search-container {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background-color: rgba(255, 255, 255, 0.7);
            border-radius: 50px;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.1);
            position: relative;
            transition: all 0.3s ease;
        }

        .search-container:hover {
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2); /* Larger shadow on hover */
            transform: translateY(-10px); /* Slight lift effect */
        }

        .search-bar {
            padding: 15px;
            font-size: 18px;
            width: 400px;
            border: none;
            border-radius: 50px;
            outline: none;
            background: #f8f8f8;
            box-shadow: inset 0 0 8px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
        }

        .search-bar:focus {
            box-shadow: inset 0 0 12px rgba(0, 0, 0, 0.2);
            background-color: #fff; /* Lighter background when focused */
        }

        .search-bar::placeholder {
            color: #888;
            font-size: 16px;
        }

        .search-button {
            padding: 15px 25px;
            font-size: 18px;
            background-color: green;
            color: #fff;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.3s ease;
            margin-left: 20px;
        }

        .search-button:hover {
            background-color: #e04f4f;
            transform: scale(1.05); /* Slight zoom on hover */
        }

        /* Footer Styling */
        .footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            text-align: center;
            padding: 20px;
            background: linear-gradient(45deg, #ffcc00, #e04f4f);
            color: #fff;
            font-size: 20px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            animation: fadeInUp 2s ease-out forwards;
        }

        /* Animation for the footer sentence */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Ensure the menu is fully visible */
        @media (max-width: 768px) {
            nav ul {
                display: flex;
                flex-direction: row;
                position: relative;
                background: none;
                text-align: center;
            }

            .search-container {
                flex-direction: column; /* Stack search bar and button */
                width: 80%;
            }

            .search-bar {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <!-- Navigation Bar -->
    <nav>
        <h1>Supercar Seller</h1>
        <ul>
            <li><a href="front page.html">Home</a></li>
            <li><a href="login.html">Login</a></li>
            <li><a href="Gallery.html">Gallery</a></li>
            <li><a href="Model.html">Model</a></li>
            <li><a href="brand.html">Brand</a></li>
            <li><a href="2 page.html">Latest</a></li>
        </ul>
    </nav>

    <!-- Centered Search Bar with New Style -->
    <div class="search-container">
        <input type="text" class="search-bar" placeholder="Search for cars..." id="searchInput">
        <button class="search-button" onclick="searchCars()">Search</button>
    </div>

    <!-- Footer with Styled Supercar Sentence -->
    <div class="footer">
        Experience the thrill of pure automotive excellence, where unrivaled power, cutting-edge design, and exhilarating performance come together to redefine what it means to drive a supercar.
    </div>

    <!-- JavaScript to handle search functionality -->
    <script>
        function searchCars() {
            const query = document.getElementById('searchInput').value;
            if (query) {
                alert('Searching for: ' + query); // Placeholder for search functionality
                // You can replace this with actual search functionality like filtering a list of cars
            } else {
                alert('Please enter a search term!');
            }
        }
    </script>
</body>
</html>
